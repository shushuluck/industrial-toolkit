    // ========== 用户补充数据系统 ==========
    const PAGE_ID = 'fault-codes';
    const STORAGE_KEY = 'toolkit_user_data_' + PAGE_ID;
    function getUserData(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]')}catch(e){return[]}}
    function saveUserData(data){localStorage.setItem(STORAGE_KEY,JSON.stringify(data))}
    function addUserEntry(entry){let data=getUserData();entry._userAdded=true;entry._timestamp=new Date().toISOString();data.push(entry);saveUserData(data);return data}
    function deleteUserEntry(index){let data=getUserData();data.splice(index,1);saveUserData(data);return data}
    function exportUserData(){let data=getUserData();let blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});let url=URL.createObjectURL(blob);let a=document.createElement('a');a.href=url;a.download=PAGE_ID+'_user_data.json';a.click();URL.revokeObjectURL(url)}
    function importUserData(){let input=document.createElement('input');input.type='file';input.accept='.json';input.onchange=function(e){let file=e.target.files[0];let reader=new FileReader();reader.onload=function(ev){try{let imported=JSON.parse(ev.target.result);if(!Array.isArray(imported))throw new Error('Invalid format');let existing=getUserData();let merged=existing.concat(imported);saveUserData(merged);showToast('导入成功，共 '+imported.length+' 条','success');location.reload()}catch(e){showToast('导入失败：文件格式错误','error')}};reader.readAsText(file)};input.click()}
    function toggleUserPanel(){let p=document.getElementById('userPanel');let a=document.getElementById('userPanelArrow');if(p.style.display==='none'){p.style.display='block';a.textContent='▲';renderUserEntries()}else{p.style.display='none';a.textContent='▼'}}
    function renderUserEntries(){let data=getUserData();let html='';data.forEach((d,i)=>{html+='<div class="card" style="border-left:3px solid var(--primary);padding:10px;margin-bottom:8px;"><div style="display:flex;justify-content:space-between;align-items:center;"><div><span class="badge badge-primary">'+d.brand+'</span> <strong>'+d.code+'</strong> — '+d.name+' <span class="badge badge-accent" style="font-size:10px;">用户补充</span></div><button class="btn btn-outline btn-sm" style="color:var(--danger);border-color:var(--danger);font-size:11px;" onclick="deleteUserEntryAndRefresh('+i+')">删除</button></div></div>'});document.getElementById('userEntries').innerHTML=html||'<div style="color:var(--text-dim);font-size:13px;">暂无补充数据</div>'}
    function deleteUserEntryAndRefresh(idx){if(!confirm('确认删除这条补充数据？'))return;deleteUserEntry(idx);renderUserEntries();document.getElementById('userCount').textContent='('+getUserData().length+'条)';filterFaults()}
    const CF_API = 'https://plc.14616679.xyz/api';
    async function submitToServer(){
      let brand=document.getElementById('uf_brand').value;
      let code=document.getElementById('uf_code').value.trim();
      let name=document.getElementById('uf_name').value.trim();
      let level=document.getElementById('uf_level').value;
      let cause=document.getElementById('uf_cause').value.trim();
      let fix=document.getElementById('uf_fix').value.trim();
      if(!code||!name){showToast('请填写故障代码和名称','error');return}
      try{
        let resp=await fetch(CF_API+'/submit',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({type:'fault_codes',brand,code,name,level,cause,fix})});
        let r=await resp.json();
        if(r.success){showToast('✅ 已提交，审核后显示','success');document.getElementById('addForm').style.display='none'}
        else{showToast('提交失败：'+(r.error||'未知'),'error')}
      }catch(e){showToast('网络错误：'+e.message,'error')}
    }
    async function viewOnlineSubmissions(){
      try{
        let resp=await fetch(CF_API+'/submissions');
        let data=await resp.json();
        if(data.success){
          let items=data.items.filter(i=>i.type==='fault_codes');
          if(items.length===0){showToast('暂无在线提交','info');return}
          let html=items.map(i=>`<div class="card" style="border-left:3px solid #8e44ad;"><span class="badge badge-accent">在线提交</span> <strong>${i.brand||''}</strong> ${i.code||''} — ${i.name||''} <span style="font-size:11px;color:var(--text-dim);">${i.created_at||''}</span></div>`).join('');
          document.getElementById('userEntries').innerHTML=html;
          document.getElementById('userPanel').style.display='block';
          document.getElementById('userPanelArrow').textContent='▲';
          showToast('显示 '+items.length+' 条在线提交','success')
        }
      }catch(e){showToast('查询失败：'+e.message,'error')}
    }
    function showAddForm(){let f=document.getElementById('addForm');if(f.style.display==='block'){f.style.display='none';return}f.style.display='block';f.innerHTML='<div style="border:1px solid var(--border);border-radius:8px;padding:16px;margin-top:8px;"><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;"><div><label style="font-size:12px;color:var(--text-dim);">品牌</label><select id="uf_brand" style="width:100%;padding:6px;border:1px solid var(--border);border-radius:4px;background:var(--bg);color:var(--text);"><option value="通用变频器">通用变频器</option><option value="西门子 S7">西门子 S7</option><option value="西门子 V20">西门子 V20</option><option value="西门子 G120">西门子 G120</option><option value="ABB ACS580">ABB ACS580</option><option value="三菱 FR-D700/E700">三菱 FR-D700/E700</option><option value="汇川 MD500">汇川 MD500</option><option value="台达 VFD-M/EL">台达 VFD-M/EL</option><option value="其他">其他</option></select></div><div><label style="font-size:12px;color:var(--text-dim);">故障代码</label><input id="uf_code" style="width:100%;padding:6px;border:1px solid var(--border);border-radius:4px;background:var(--bg);color:var(--text);" placeholder="如 E001"></div><div><label style="font-size:12px;color:var(--text-dim);">故障名称</label><input id="uf_name" style="width:100%;padding:6px;border:1px solid var(--border);border-radius:4px;background:var(--bg);color:var(--text);" placeholder="如 过电流"></div><div><label style="font-size:12px;color:var(--text-dim);">严重程度</label><select id="uf_level" style="width:100%;padding:6px;border:1px solid var(--border);border-radius:4px;background:var(--bg);color:var(--text);"><option value="严重">严重</option><option value="警告">警告</option><option value="信息">信息</option></select></div></div><div style="margin-top:10px;"><label style="font-size:12px;color:var(--text-dim);">可能原因（每行一条）</label><textarea id="uf_cause" rows="3" style="width:100%;padding:6px;border:1px solid var(--border);border-radius:4px;background:var(--bg);color:var(--text);"></textarea></div><div style="margin-top:10px;"><label style="font-size:12px;color:var(--text-dim);">处理方法（每行一条）</label><textarea id="uf_fix" rows="3" style="width:100%;padding:6px;border:1px solid var(--border);border-radius:4px;background:var(--bg);color:var(--text);"></textarea></div><div style="display:flex;gap:8px;margin-top:12px;"><button class="btn btn-primary" onclick="submitFaultEntry()">💾 保存本地</button><button class="btn" style="background:#8e44ad;color:#fff;" onclick="submitToServer()">🌐 提交到服务器</button></div></div>'}
    function submitFaultEntry(){let brand=document.getElementById('uf_brand').value;let code=document.getElementById('uf_code').value.trim();let name=document.getElementById('uf_name').value.trim();let level=document.getElementById('uf_level').value;let cause=document.getElementById('uf_cause').value.trim().split('\n').filter(s=>s.trim());let fix=document.getElementById('uf_fix').value.trim().split('\n').filter(s=>s.trim());if(!code||!name){showToast('请填写故障代码和名称','error');return}addUserEntry({brand,code,name,level,cause,fix});document.getElementById('addForm').style.display='none';showToast('添加成功','success');renderUserEntries();document.getElementById('userCount').textContent='('+getUserData().length+'条)';filterFaults()}
    let activeBrand='';
    function renderBrands(){
      let brands=[...new Set(faults.map(f=>f.brand))];
      let html=`<span class="tag" onclick="setBrand('')" style="${activeBrand===''?'background:var(--primary);color:#000;':''}">全部</span>`;
      html+=brands.map(b=>`<span class="tag" onclick="setBrand('${b}')" style="${activeBrand===b?'background:var(--primary);color:#000;':''}">${b}</span>`).join('');
      document.getElementById('brandBar').innerHTML=html;
    }
    function setBrand(b){activeBrand=b;renderBrands();filterFaults();}
    function filterFaults(){
      let q=document.getElementById('search').value.toLowerCase();
      let allData=faults.concat(getUserData());
      let filtered=allData.filter(f=>{
        let matchBrand=!activeBrand||f.brand===activeBrand;
        let text=`${f.code} ${f.name} ${f.cause.join(' ')} ${f.fix.join(' ')}`.toLowerCase();
        let matchSearch=!q||text.includes(q);
        return matchBrand&&matchSearch;
      });
      renderFaults(filtered);
    }
    function renderFaults(list){
      let html=list.map(f=>{
        let levelColor={严重:'danger',警告:'warn',信息:'primary'}[f.level]||'primary';
        let userBadge=f._userAdded?' <span class="badge badge-accent" style="font-size:10px;">用户补充</span>':'';
        return `<div class="card" ${f._userAdded?'style="border-left:3px solid var(--primary);"':''}>
          <div class="card-title"><span style="font-size:20px;">⚠️</span> ${f.code} — ${f.name} <span class="badge badge-${levelColor}">${f.level}</span> <span class="badge badge-primary">${f.brand}</span>${userBadge}</div>
          <div class="grid-2">
            <div>
              <div style="font-weight:600;margin-bottom:6px;color:var(--danger);">🔍 可能原因：</div>
              <ul style="margin-left:16px;font-size:13px;color:var(--text-dim);line-height:2;">
                ${f.cause.map(c=>`<li>${c}</li>`).join('')}
              </ul>
            </div>
            <div>
              <div style="font-weight:600;margin-bottom:6px;color:var(--success);">🔧 处理方法：</div>
              <ul style="margin-left:16px;font-size:13px;color:var(--text-dim);line-height:2;">
                ${f.fix.map(c=>`<li>${c}</li>`).join('')}
              </ul>
            </div>
          </div>
        </div>`;
      }).join('');
      document.getElementById('faultList').innerHTML=html||'<div class="card" style="text-align:center;color:var(--text-dim);">未找到匹配的故障代码</div>';
    }
    renderBrands();
    renderFaults(faults);
    document.getElementById('userCount').textContent='('+getUserData().length+'条)';
  </script>
