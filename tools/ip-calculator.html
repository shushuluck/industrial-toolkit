<script>
// ========== 工具函数 ==========
function parseIP(s) {
  s = s.trim();
  const parts = s.split('.');
  if (parts.length !== 4) return null;
  const b = parts.map(Number);
  if (b.some(v => isNaN(v) || v < 0 || v > 255)) return null;
  return (b[0]<<24|b[1]<<16|b[2]<<8|b[3])>>>0;
}

function ipToStr(n) {
  return [(n>>>24)&255,(n>>>16)&255,(n>>>8)&255,n&255].join('.');
}

function parseCIDR(s) {
  s = s.trim();
  if (s.includes('/')) {
    const [ip, cidr] = s.split('/');
    const ipN = parseIP(ip);
    const c = parseInt(cidr);
    if (ipN===null||isNaN(c)||c<0||c>32) return null;
    return {ip: ipN, cidr: c, mask: c===0?0:(0xFFFFFFFF<<(32-c))>>>0};
  }
  const ipN = parseIP(s);
  if (ipN!==null) return {ip: ipN, cidr: 32, mask: 0xFFFFFFFF};
  return null;
}

function parseMaskOrCIDR(s) {
  s = s.trim();
  const n = parseInt(s);
  if (!isNaN(n) && n>=0 && n<=32) return {cidr:n, mask: n===0?0:(0xFFFFFFFF<<(32-n))>>>0};
  const ipN = parseIP(s);
  if (ipN!==null) {
    let cidr = 0;
    let v = ipN;
    while(v & 0x80000000) { cidr++; v<<=1; }
    if (((0xFFFFFFFF<<(32-cidr))>>>0) === ipN) return {cidr, mask: ipN};
  }
  return null;
}

// ========== 1. IP计算器 ==========
function calculateIP() {
  const ipN = parseIP(document.getElementById('calc-ip').value);
  const m = parseMaskOrCIDR(document.getElementById('calc-mask').value);
  if (!ipN||!m) { alert('请输入有效的IP和掩码'); return; }
  const mask = m.mask;
  const network = (ipN & mask)>>>0;
  const broadcast = (network | ~mask)>>>0;
  const hosts = broadcast - network - 1;
  const wildcard = (~mask)>>>0;
  document.getElementById('r-network').textContent = ipToStr(network);
  document.getElementById('r-broadcast').textContent = ipToStr(broadcast);
  document.getElementById('r-range').textContent = hosts>0 ? ipToStr(network+1)+' ~ '+ipToStr(broadcast-1) : '无';
  document.getElementById('r-hosts').textContent = hosts>0 ? hosts.toLocaleString() : '0';
  document.getElementById('r-mask').textContent = ipToStr(mask)+' /'+m.cidr;
  document.getElementById('r-wildcard').textContent = ipToStr(wildcard);
}

// ========== 2. 子网划分 ==========
function splitSubnet() {
  const src = parseCIDR(document.getElementById('subnet-src').value);
  const count = parseInt(document.getElementById('subnet-count').value);
  if (!src) { alert('请输入有效的网段'); return; }
  if (!count||count<2) { alert('子网数至少为2'); return; }
  const bits = Math.ceil(Math.log2(count));
  const newCidr = src.cidr + bits;
  if (newCidr>30) { alert('子网数超出可用范围'); return; }
  const newMask = (0xFFFFFFFF<<(32-newCidr))>>>0;
  const blockSize = (newMask===0)?0x100000000:(~newMask+1)>>>0;
  let html = '<div class="subnet-result"><table><thead><tr><th>子网</th><th>网络地址</th><th>可用IP范围</th><th>广播地址</th><th>主机数</th></tr></thead><tbody>';
  const total = 1<<bits;
  for (let i=0; i<total && i<count; i++) {
    const net = (src.ip + i*blockSize)>>>0;
    const bcast = (net + blockSize - 1)>>>0;
    const h = blockSize - 2;
    html += `<tr><td>${i+1}</td><td>${ipToStr(net)}/${newCidr}</td><td>${ipToStr(net+1)} ~ ${ipToStr(bcast-1)}</td><td>${ipToStr(bcast)}</td><td>${h}</td></tr>`;
  }
  html += '</tbody></table></div>';
  document.getElementById('subnet-result').innerHTML = html;
}

function loadPreset(key) {
  const p = PRESETS[key];

function addPlanRow() {
  planData.push({type:'other', name:'新设备组', start:200, end:210, network:'192.168.1.0/24'});
  renderPlan();
}

function renderPlan() {
  if (!planData.length) {
    document.getElementById('planning-table').innerHTML = '<p style="color:#888">请从上方选择预设模板，或点击"添加设备分组"自定义规划。</p>';
    return;
  }
  let html = '<table><thead><tr><th>设备类型</th><th>分组名称</th><th>起始IP</th><th>结束IP</th><th>数量</th><th>操作</th></tr></thead><tbody>';
  planData.forEach((d,i) => {
    const t = DEVICE_TYPES[d.type]||DEVICE_TYPES.other;
    html += `<tr>
      <td><span class="badge ${t.css}">${t.name}</span></td>
      <td><input value="${d.name}" onchange="planData[${i}].name=this.value" style="background:transparent;border:1px solid #444;color:#eee;padding:4px;border-radius:4px;width:140px;font-family:monospace"></td>
      <td>${d.network.split('/')[0].replace(/\.\d+$/,'.'+d.start)}</td>
      <td>${d.network.split('/')[0].replace(/\.\d+$/,'.'+d.end)}</td>
      <td>${d.end-d.start+1}</td>
      <td><button class="btn secondary" style="padding:4px 10px;font-size:12px" onclick="planData.splice(${i},1);renderPlan()">删除</button></td>
    </tr>`;
  });
  html += '</tbody></table>';
  document.getElementById('planning-table').innerHTML = html;
}

function exportPlan() {
  if (!planData.length) { alert('暂无规划数据'); return; }
  let txt = '=== 工业网络IP规划表 ===\n\n';
  planData.forEach(d => {
    const t = DEVICE_TYPES[d.type]||DEVICE_TYPES.other;
    const prefix = d.network.split('/')[0].replace(/\.\d+$/,'');
    txt += `[${t.name}] ${d.name}\n  ${prefix}.${d.start} ~ ${prefix}.${d.end} (${d.end-d.start+1}个地址)\n\n`;
  });
  navigator.clipboard.writeText(txt).then(()=>alert('已复制到剪贴板！')).catch(()=>prompt('复制以下内容：',txt));
}

// ========== 4. 冲突检测 ==========
function checkConflict() {
  const ip1 = parseIP(document.getElementById('conflict-ip1').value);
  const ip2 = parseIP(document.getElementById('conflict-ip2').value);
  const m = parseMaskOrCIDR(document.getElementById('conflict-mask').value);
  if (!ip1||!ip2||!m) { alert('请输入有效的IP和掩码'); return; }
  const net1 = (ip1 & m.mask)>>>0;
  const net2 = (ip2 & m.mask)>>>0;
  const same = net1 === net2;
  let html = `<div style="margin-top:10px;padding:12px;border-radius:8px;background:${same?'#1B3A1B':'#3A1B1B'};border:1px solid ${same?'#4CAF50':'#F44336'}">`;
  if (same) {
    html += `<span class="status-ok">✅ 同一网段</span> — 两个IP在 <b>${ipToStr(net1)}/${m.cidr}</b> 网段内。`;
    if (ip1===ip2) html += `<br><span class="status-conflict">⚠️ 两个IP完全相同，存在冲突！</span>`;
    html += `<br><span style="font-size:13px;color:#aaa">网段: ${ipToStr(net1)} ~ ${ipToStr((net1|~m.mask)>>>0)}</span>`;
  } else {
    html += `<span class="status-ok">✅ 不同网段</span> — IP1属于 <b>${ipToStr(net1)}/${m.cidr}</b>，IP2属于 <b>${ipToStr(net2)}/${m.cidr}</b>，无冲突。`;
  }
  html += '</div>';
  document.getElementById('conflict-result').innerHTML = html;
}

function filterDeviceTable() {
  const q = document.getElementById('device-search').value.toLowerCase();
  const tbody = document.querySelector('#device-table tbody');
  const filtered = DEVICE_DB.filter(d =>
    !q || d.brand.toLowerCase().includes(q) || d.model.toLowerCase().includes(q) || d.protocol.toLowerCase().includes(q) || d.note.toLowerCase().includes(q) || d.ip.includes(q)
  );
  tbody.innerHTML = filtered.map(d =>
    `<tr><td>${d.brand}</td><td>${d.model}</td><td>${d.ip}</td><td>${d.port}</td><td>${d.protocol}</td><td>${d.note}</td></tr>`
  ).join('');
}
