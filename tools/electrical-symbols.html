<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>电气符号图库 | 工控工具箱</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .symbol-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;}
    .symbol-card{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:16px;text-align:center;cursor:pointer;transition:all 0.2s;}
    .symbol-card:hover{border-color:var(--primary);transform:translateY(-2px);}
    .symbol-card svg{width:80px;height:80px;margin-bottom:8px;}
    .symbol-card .name{font-size:13px;font-weight:500;}
    .symbol-card .code{font-size:11px;color:var(--text-dim);font-family:var(--mono);}
  </style>
</head>
<body>
  <div class="header">
    <a class="header-title" href="../index.html"><span class="icon">🏭</span><div><h1>工控工具箱</h1><div class="subtitle">Industrial Toolkit</div></div></a>
  </div>
  <div class="container fade-in">
    <a href="../index.html" class="back-link">← 返回主页</a>
    <div class="tool-header"><h2>⚡ 电气符号图库</h2><p>GB/IEC 标准电气符号 SVG 矢量图</p></div>
    <div class="card">
      <div class="search-box"><input type="text" id="search" placeholder="搜索符号名称..." oninput="filterSymbols()"></div>
      <div style="margin-top:10px;" id="catBar"></div>
    </div>
    <div id="symbolList"></div>
  </div>
  <div class="footer">工控工具箱 — 电气符号图库</div>
  <script src="../js/common.js"></script>
  <script>
    const symbols=[
      {cat:'基本元件',name:'电阻',code:'R',svg:`<svg viewBox="0 0 80 80"><line x1="0" y1="40" x2="20" y2="40" stroke="#00d4ff" stroke-width="2"/><rect x="20" y="25" width="40" height="30" fill="none" stroke="#00d4ff" stroke-width="2"/><line x1="60" y1="40" x2="80" y2="40" stroke="#00d4ff" stroke-width="2"/></svg>`},
      {cat:'基本元件',name:'电容',code:'C',svg:`<svg viewBox="0 0 80 80"><line x1="0" y1="40" x2="32" y2="40" stroke="#00d4ff" stroke-width="2"/><line x1="32" y1="15" x2="32" y2="65" stroke="#00d4ff" stroke-width="2"/><line x1="48" y1="15" x2="48" y2="65" stroke="#00d4ff" stroke-width="2"/><line x1="48" y1="40" x2="80" y2="40" stroke="#00d4ff" stroke-width="2"/></svg>`},
      {cat:'基本元件',name:'电感',code:'L',svg:`<svg viewBox="0 0 80 80"><line x1="0" y1="40" x2="15" y2="40" stroke="#00d4ff" stroke-width="2"/><path d="M15,40 Q15,20 25,20 Q35,20 35,40 Q35,20 45,20 Q55,20 55,40 Q55,20 65,20 Q75,20 75,40" fill="none" stroke="#00d4ff" stroke-width="2"/><line x1="65" y1="40" x2="80" y2="40" stroke="#00d4ff" stroke-width="2"/></svg>`},
      {cat:'基本元件',name:'二极管',code:'VD',svg:`<svg viewBox="0 0 80 80"><line x1="0" y1="40" x2="25" y2="40" stroke="#00d4ff" stroke-width="2"/><polygon points="25,20 25,60 55,40" fill="none" stroke="#00d4ff" stroke-width="2"/><line x1="55" y1="20" x2="55" y2="60" stroke="#00d4ff" stroke-width="2"/><line x1="55" y1="40" x2="80" y2="40" stroke="#00d4ff" stroke-width="2"/></svg>`},
      {cat:'基本元件',name:'LED',code:'VL',svg:`<svg viewBox="0 0 80 80"><line x1="0" y1="40" x2="25" y2="40" stroke="#00d4ff" stroke-width="2"/><polygon points="25,20 25,60 55,40" fill="none" stroke="#00d4ff" stroke-width="2"/><line x1="55" y1="20" x2="55" y2="60" stroke="#00d4ff" stroke-width="2"/><line x1="55" y1="40" x2="80" y2="40" stroke="#00d4ff" stroke-width="2"/><line x1="48" y1="15" x2="58" y2="5" stroke="#ff6b35" stroke-width="1.5"/><polygon points="56,4 60,8 54,8" fill="#ff6b35"/><line x1="54" y1="12" x2="64" y2="2" stroke="#ff6b35" stroke-width="1.5"/><polygon points="62,1 66,5 60,5" fill="#ff6b35"/></svg>`},
      {cat:'开关继电器',name:'常开触点',code:'SB/NO',svg:`<svg viewBox="0 0 80 80"><line x1="0" y1="40" x2="25" y2="40" stroke="#00d4ff" stroke-width="2"/><circle cx="25" cy="40" r="4" fill="none" stroke="#00d4ff" stroke-width="2"/><line x1="29" y1="38" x2="51" y2="22" stroke="#00d4ff" stroke-width="2"/><circle cx="55" cy="40" r="4" fill="none" stroke="#00d4ff" stroke-width="2"/><line x1="59" y1="40" x2="80" y2="40" stroke="#00d4ff" stroke-width="2"/></svg>`},
      {cat:'开关继电器',name:'常闭触点',code:'NC',svg:`<svg viewBox="0 0 80 80"><line x1="0" y1="40" x2="25" y2="40" stroke="#00d4ff" stroke-width="2"/><circle cx="25" cy="40" r="4" fill="none" stroke="#00d4ff" stroke-width="2"/><line x1="29" y1="38" x2="51" y2="38" stroke="#00d4ff" stroke-width="2"/><circle cx="55" cy="40" r="4" fill="none" stroke="#00d4ff" stroke-width="2"/><line x1="59" y1="40" x2="80" y2="40" stroke="#00d4ff" stroke-width="2"/></svg>`},
      {cat:'开关继电器',name:'线圈',code:'KM',svg:`<svg viewBox="0 0 80 80"><line x1="0" y1="40" x2="20" y2="40" stroke="#00d4ff" stroke-width="2"/><rect x="20" y="22" width="40" height="36" fill="none" stroke="#00d4ff" stroke-width="2"/><text x="40" y="46" text-anchor="middle" fill="#00d4ff" font-size="16">K</text><line x1="60" y1="40" x2="80" y2="40" stroke="#00d4ff" stroke-width="2"/></svg>`},
      {cat:'开关继电器',name:'急停按钮',code:'SB-E',svg:`<svg viewBox="0 0 80 80"><line x1="0" y1="40" x2="20" y2="40" stroke="#00d4ff" stroke-width="2"/><circle cx="40" cy="40" r="18" fill="none" stroke="#ff5252" stroke-width="2"/><line x1="29" y1="29" x2="51" y2="51" stroke="#ff5252" stroke-width="3"/><circle cx="20" cy="40" r="3" fill="#00d4ff"/><circle cx="60" cy="40" r="3" fill="#00d4ff"/><line x1="60" y1="40" x2="80" y2="40" stroke="#00d4ff" stroke-width="2"/></svg>`},
      {cat:'电机',name:'三相电机',code:'M3~',svg:`<svg viewBox="0 0 80 80"><circle cx="40" cy="40" r="24" fill="none" stroke="#00d4ff" stroke-width="2"/><text x="40" y="44" text-anchor="middle" fill="#00d4ff" font-size="14" font-weight="bold">M</text><text x="40" y="56" text-anchor="middle" fill="#ff6b35" font-size="10">3~</text><line x1="16" y1="40" x2="0" y2="25" stroke="#FFD700" stroke-width="2"/><line x1="16" y1="40" x2="0" y2="40" stroke="#228B22" stroke-width="2"/><line x1="16" y1="40" x2="0" y2="55" stroke="#CC0000" stroke-width="2"/></svg>`},
      {cat:'电机',name:'单相电机',code:'M1~',svg:`<svg viewBox="0 0 80 80"><circle cx="40" cy="40" r="24" fill="none" stroke="#00d4ff" stroke-width="2"/><text x="40" y="44" text-anchor="middle" fill="#00d4ff" font-size="14" font-weight="bold">M</text><text x="40" y="56" text-anchor="middle" fill="#ff6b35" font-size="10">1~</text><line x1="16" y1="40" x2="0" y2="35" stroke="#00d4ff" stroke-width="2"/><line x1="16" y1="40" x2="0" y2="45" stroke="#00d4ff" stroke-width="2"/></svg>`},
      {cat:'保护',name:'熔断器',code:'FU',svg:`<svg viewBox="0 0 80 80"><line x1="0" y1="40" x2="22" y2="40" stroke="#00d4ff" stroke-width="2"/><rect x="22" y="28" width="36" height="24" rx="4" fill="none" stroke="#00d4ff" stroke-width="2"/><line x1="30" y1="40" x2="50" y2="40" stroke="#00d4ff" stroke-width="2"/><line x1="58" y1="40" x2="80" y2="40" stroke="#00d4ff" stroke-width="2"/></svg>`},
      {cat:'保护',name:'热继电器',code:'FR',svg:`<svg viewBox="0 0 80 80"><line x1="0" y1="30" x2="20" y2="30" stroke="#00d4ff" stroke-width="2"/><rect x="20" y="18" width="40" height="24" fill="none" stroke="#00d4ff" stroke-width="2"/><text x="40" y="35" text-anchor="middle" fill="#ff6b35" font-size="12">FR</text><line x1="60" y1="30" x2="80" y2="30" stroke="#00d4ff" stroke-width="2"/><line x1="30" y1="42" x2="30" y2="52" stroke="#00d4ff" stroke-width="1.5"/><line x1="50" y1="42" x2="50" y2="52" stroke="#00d4ff" stroke-width="1.5"/><line x1="30" y1="55" x2="30" y2="60" stroke="#00d4ff" stroke-width="1.5"/><circle cx="30" cy="63" r="3" fill="none" stroke="#00d4ff" stroke-width="1.5"/><line x1="50" y1="55" x2="50" y2="60" stroke="#00d4ff" stroke-width="1.5"/><circle cx="50" cy="63" r="3" fill="none" stroke="#00d4ff" stroke-width="1.5"/><line x1="33" y1="55" x2="47" y2="55" stroke="#ff6b35" stroke-width="1"/></svg>`},
      {cat:'传感器',name:'接近开关(电感式)',code:'SQ',svg:`<svg viewBox="0 0 80 80"><rect x="15" y="20" width="50" height="40" rx="4" fill="none" stroke="#00d4ff" stroke-width="2"/><text x="40" y="45" text-anchor="middle" fill="#00d4ff" font-size="10">NCN</text><line x1="40" y1="60" x2="40" y2="75" stroke="#00d4ff" stroke-width="2"/><line x1="0" y1="30" x2="15" y2="30" stroke="#00d4ff" stroke-width="2"/><line x1="0" y1="50" x2="15" y2="50" stroke="#00d4ff" stroke-width="2"/><line x1="65" y1="40" x2="80" y2="40" stroke="#00d4ff" stroke-width="2"/></svg>`},
      {cat:'传感器',name:'光电开关',code:'BQ',svg:`<svg viewBox="0 0 80 80"><rect x="10" y="20" width="30" height="40" rx="4" fill="none" stroke="#00d4ff" stroke-width="2"/><text x="25" y="45" text-anchor="middle" fill="#00d4ff" font-size="10">E</text><line x1="40" y1="30" x2="60" y2="30" stroke="#ff6b35" stroke-width="1.5" stroke-dasharray="4,2"/><line x1="40" y1="45" x2="60" y2="45" stroke="#00d4ff" stroke-width="1.5" stroke-dasharray="4,2"/><rect x="55" y="20" width="15" height="40" rx="4" fill="none" stroke="#00d4ff" stroke-width="2"/><text x="62" y="45" text-anchor="middle" fill="#00d4ff" font-size="8">R</text><line x1="0" y1="35" x2="10" y2="35" stroke="#00d4ff" stroke-width="2"/><line x1="0" y1="50" x2="10" y2="50" stroke="#00d4ff" stroke-width="2"/></svg>`},
      {cat:'电源',name:'接地',code:'GND/PE',svg:`<svg viewBox="0 0 80 80"><line x1="40" y1="0" x2="40" y2="35" stroke="#00d4ff" stroke-width="2"/><line x1="15" y1="35" x2="65" y2="35" stroke="#00d4ff" stroke-width="2"/><line x1="22" y1="45" x2="58" y2="45" stroke="#00d4ff" stroke-width="2"/><line x1="30" y1="55" x2="50" y2="55" stroke="#00d4ff" stroke-width="2"/></svg>`},
      {cat:'电源',name:'电池',code:'GB',svg:`<svg viewBox="0 0 80 80"><line x1="0" y1="40" x2="30" y2="40" stroke="#00d4ff" stroke-width="2"/><line x1="30" y1="15" x2="30" y2="65" stroke="#00d4ff" stroke-width="3"/><line x1="40" y1="25" x2="40" y2="55" stroke="#00d4ff" stroke-width="1.5"/><line x1="50" y1="15" x2="50" y2="65" stroke="#00d4ff" stroke-width="3"/><line x1="60" y1="25" x2="60" y2="55" stroke="#00d4ff" stroke-width="1.5"/><line x1="60" y1="40" x2="80" y2="40" stroke="#00d4ff" stroke-width="2"/><text x="35" y="75" fill="#ff6b35" font-size="10">+</text></svg>`},
    ];
    let activeCat='';
    function renderCats(){
      let cats=[...new Set(symbols.map(s=>s.cat))];
      let html=`<span class="tag" onclick="setCat('')" style="${activeCat===''?'background:var(--primary);color:#000;':''}">全部</span>`;
      html+=cats.map(c=>`<span class="tag" onclick="setCat('${c}')" style="${activeCat===c?'background:var(--primary);color:#000;':''}">${c}</span>`).join('');
      document.getElementById('catBar').innerHTML=html;
    }
    function setCat(c){activeCat=c;renderCats();filterSymbols();}
    function filterSymbols(){
      let q=document.getElementById('search').value.toLowerCase();
      let filtered=symbols.filter(s=>{
        let matchCat=!activeCat||s.cat===activeCat;
        let matchSearch=!q||s.name.toLowerCase().includes(q)||s.code.toLowerCase().includes(q);
        return matchCat&&matchSearch;
      });
      renderSymbols(filtered);
    }
    function renderSymbols(list){
      let html=`<div class="symbol-grid">${list.map(s=>`<div class="symbol-card" onclick="copyText('${s.code}',this)">${s.svg}<div class="name">${s.name}</div><div class="code">${s.code}</div></div>`).join('')}</div>`;
      document.getElementById('symbolList').innerHTML=html||'<div class="card" style="text-align:center;color:var(--text-dim);">未找到匹配的符号</div>';
    }
    renderCats();
    renderSymbols(symbols);
  </script>
</body>
</html>
